name: Build Linux Distribution

on:
  push:
    branches:
      - master
      - release/**
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender1 \
            libgomp1 \
            libfontconfig1 \
            libfreetype6 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Run tests
        run: pytest -v

      - name: Build Linux distribution
        run: python scripts/build-linux.py

      - name: List build artifacts
        run: |
          ls -la dist/
          echo "---"
          ls -la dist/eyes/ 2>/dev/null | head -20 || echo "No eyes directory"
          echo "---"
          echo "Tarball size:"
          du -h dist/*.tar.gz 2>/dev/null || echo "No tarball found"

      - name: Upload tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: eyes-linux-x86_64
          path: dist/eyes-linux-x86_64.tar.gz
          retention-days: 30

      - name: Upload onedir as artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: eyes-linux-ondir
          path: dist/eyes/
          retention-days: 7

  # Verification job - runs after build to verify the artifact
  verify-build:
    runs-on: ubuntu-22.04
    needs: build-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Linux tarball
        uses: actions/download-artifact@v4
        with:
          name: eyes-linux-x86_64
          path: .

      - name: Extract tarball
        run: |
          tar -xzf eyes-linux-x86_64.tar.gz
          ls -la eyes/

      - name: Verify executable exists
        run: |
          EXE="./eyes/eyes"
          if [ -f "$EXE" ]; then
            echo "✓ Executable exists: $EXE"
            file "$EXE"
            ls -la "$EXE"
          else
            echo "✗ Executable not found at $EXE"
            ls -la eyes/
            exit 1
          fi

      - name: Verify required libraries bundled
        run: |
          echo "Checking for required shared libraries in bundle..."
          # Check for some key Qt and OpenCV libraries
          if ls eyes/*.so* 2>/dev/null | head -5; then
            echo "✓ .so files found in bundle"
          else
            echo "Warning: No .so files found - checking PySide6..."
          fi
          ls -la eyes/ | head -20

      - name: Build summary
        run: |
          echo "## Linux Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tarball**: \`eyes-linux-x86_64.tar.gz\`" >> $GITHUB_STEP_SUMMARY
          echo "**Executable**: \`eyes/eyes\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "eyes-linux-x86_64.tar.gz" ]; then
            SIZE=$(du -h eyes-linux-x86_64.tar.gz | cut -f1)
            echo "**Size**: $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platform Caveats" >> $GITHUB_STEP_SUMMARY
          echo "- **X11**: First-class target, tested on Ubuntu 22.04 LTS" >> $GITHUB_STEP_SUMMARY
          echo "- **Wayland**: Best-effort support per ADR-0004. Always-on-top may not work on all compositors." >> $GITHUB_STEP_SUMMARY
          echo "- **Camera**: Uses v4l2 via OpenCV, no extra capabilities required" >> $GITHUB_STEP_SUMMARY
